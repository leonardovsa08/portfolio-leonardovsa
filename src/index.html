<!doctype html>
<html lang="pt-br" class="dark">

<head>
  <meta charset="utf-8">
  <title>Portfolio - Leonardovsa</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="images/logo-ls.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>

<body
  class="bg-background-dark text-slate-200 antialiased selection:bg-primary/30 ">
  <div class="fixed inset-0 -z-10 overflow-hidden">

    <!-- BASE -->
    <div class="absolute inset-0 bg-background-dark"></div>
  
    <!-- FORMA GRANDE SUAVE -->
    <div class="absolute -top-40 -left-40 w-[600px] h-[600px]
      border border-primary/10 rotate-45
      opacity-50 animate-slow-float border-light">
    </div>
  
    <!-- LINHA PRINCIPAL -->
    <div class="absolute top-1/3 -left-32 w-[900px] h-[2px]
      bg-gradient-to-r from-transparent via-primary/30 to-transparent  line-light 
      rotate-12 animate-slow-float"> 
    </div>
  
    <div class="absolute bottom-60 right-[-1px] opacity-50 rotate-12">

      <div class="w-[450px] h-[1px] line-light rotate-12"></div>
      <div class="w-[450px] h-[1px] line-light -rotate-12 mt-6"></div>
    
    </div>
  
    <!-- LINHAS PARALELAS -->
    <div class="absolute bottom-10 -left-2 space-y-6 rotate-[-18deg] opacity-50">
      <div class="w-[220px] h-[2px] line-light"></div>
      <div class="w-[160px] h-[2px] line-light "></div>
      <div class="w-[100px] h-[2px] line-light top-2"></div>
    </div>
  
 
  
  </div>
  
  <app-root></app-root>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init();
  </script>
</body>

</html>
